<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Encuesta ATLAS — CNV</title>
  <!-- Redirección a la encuesta real (app ATLAS de Santiago). Cambiar SOLO esta URL si la encuesta se muda. -->
  <meta http-equiv="refresh" content="0; url=https://atlas-gil.vercel.app/encuesta/demo-encuesta-inicial-0001">
  <link rel="canonical" href="https://atlas-gil.vercel.app/encuesta/demo-encuesta-inicial-0001">
  <style>
    body{font-family:'Segoe UI',Roboto,system-ui,sans-serif;background:#f0f4f3;color:#14342c;margin:0;
         min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;}
    .box{max-width:420px}
    .spin{width:34px;height:34px;border:4px solid #1a6b5a;border-top-color:transparent;border-radius:50%;
          animation:sp 1s linear infinite;margin:0 auto 18px}
    @keyframes sp{to{transform:rotate(360deg)}}
    a{color:#1a6b5a;font-weight:700}
  </style>
</head>
<body>
  <div class="box">
    <div class="spin"></div>
    <p>Abriendo tu encuesta…</p>
    <p style="font-size:14px;color:#5b6b64;margin-top:14px">
      Si no avanza, <a href="https://atlas-gil.vercel.app/encuesta/demo-encuesta-inicial-0001">toca aquí para continuar</a>.
    </p>
  </div>
  <script>
    location.replace('https://atlas-gil.vercel.app/encuesta/demo-encuesta-inicial-0001');
  </script>
</body>
</html>
